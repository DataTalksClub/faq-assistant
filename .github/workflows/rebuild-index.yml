name: Rebuild index and deploy

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  rebuild-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for AWS credentials
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"  # must match the Lambda runtime (index format is Python-version-tagged)

      - name: Rebuild corpus, config and index
        run: |
          uv run --group ingest python scripts/build_search_corpus.py
          uv run python scripts/compile_config.py
          uv run python scripts/build_search_index.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke-test the handler
        run: uv run python scripts/check_handler.py

      - name: Set up AWS SAM
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy with SAM
        run: |
          sam build
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name faq-assistant \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              OpenAIApiKey=${{ secrets.OPENAI_API_KEY }} \
              SharedSecret=${{ secrets.FAQ_ASSISTANT_SHARED_SECRET }}
