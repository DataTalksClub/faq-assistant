name: Rebuild FAQ Assistant Corpus

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  rebuild-corpus:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --group ingest

      - name: Rebuild search corpus
        run: |
          uv run --group ingest python scripts/build_search_corpus.py
          uv run python scripts/compile_config.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Worker
        run: uv run pywrangler deploy --keep-vars
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
